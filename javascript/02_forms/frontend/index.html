<!DOCTYPE html>
<html>
	<head>
		<title>Form Greetings</title>
		<meta charset="UTF-8"/>
		<script src="script.js"></script>
	</head>
	<body>
		<form id="greetingform">
			<label for="firstname">First Name</label>
			<input type="text"
					id="firstname"
					name="firstname"/>
			<br/>
			<label for="lastname">Last Name</label>
			<input type="text"
					id="lastname"
					name="lastname"/>
			<br/>
			<input type="submit" value="Greet"/>
		</form>
		<h3 id="greeting">No greeting yet</h3>
	</body>
</html>
